apply plugin: 'com.android.library'

android {
    namespace 'com.universalserialsdk'
    compileSdkVersion 34

    defaultConfig {
        minSdkVersion 19        // Android 4.4 KitKat - covers virtually all industrial devices
        targetSdkVersion 34
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    // android-serialport-api: handles native UART open + termios baud rate config via JNI
    implementation 'com.github.licheedev:Android-SerialPort-API:2.0.0'

    // Capacitor core: compileOnly because it already exists in the host app project
    compileOnly 'com.getcapacitor:core:+'
}
